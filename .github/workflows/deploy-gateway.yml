name: Deploy Gateway

on:
  push:
    branches: [main, master]
    paths:
      - 'sms-gateway/**'
      - 'terraform/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  deploy:
    name: Deploy Gateway to Cloud Run via Terraform
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'
          # Disable wrapper so the deploy script can call terraform directly
          # without the wrapper's exit-code shim interfering.
          terraform_wrapper: false

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init -backend-config="prefix=env/prod"

      - name: Deploy gateway
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
        run: ./sms-gateway/scripts/deploy.sh --env=prod
