name: Deploy Gateway

on:
  push:
    branches: [main, master]
    paths:
      - 'sms-gateway/**'
      - 'terraform/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  build-and-plan:
    name: Build image and plan Terraform changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation
    outputs:
      image-ref: ${{ steps.image.outputs.ref }}
      has-tf-changes: ${{ steps.plan.outputs.has-changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'
          terraform_wrapper: false

      - name: Build and push image
        id: image
        run: |
          IMAGE="us-docker.pkg.dev/schoopet-prod/schoopet/shoopet-sms-gateway"
          gcloud builds submit --tag "$IMAGE" --project schoopet-prod \
            --gcs-source-staging-dir="gs://schoopet-prod_cloudbuild/source/" \
            --gcs-log-dir="gs://schoopet-prod_cloudbuild/logs/" \
            sms-gateway/
          DIGEST=$(gcloud artifacts docker images describe "$IMAGE" \
            --project schoopet-prod \
            --format="value(image_summary.digest)" 2>/dev/null)
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="prefix=env/prod"

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan \
            -var-file="environments/prod.tfvars" \
            -var="sms_gateway_image=${{ steps.image.outputs.ref }}" \
            | tee /tmp/plan.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then exit 1; fi
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/plan.txt >> "$GITHUB_STEP_SUMMARY"
          printf '```\n' >> "$GITHUB_STEP_SUMMARY"
          if [ $PLAN_EXIT -eq 2 ]; then
            # Auto-apply if the only changes are Cloud Run service updates (e.g. image digest).
            # Anything else (IAM, Pub/Sub, scheduler, etc.) still requires approval.
            NON_CLOUDRUN=$(terraform show -json tfplan \
              | jq '[.resource_changes[] | select(.change.actions != ["no-op"] and .type != "google_cloud_run_v2_service")] | length')
            echo "has-changes=$([ "$NON_CLOUDRUN" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1

  # No Terraform changes — apply immediately without approval gate.
  apply:
    name: Apply (no infra changes)
    needs: build-and-plan
    if: needs.build-and-plan.outputs.has-tf-changes == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'
          terraform_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="prefix=env/prod"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply tfplan

  # Terraform changes detected — pause for manual approval before applying.
  apply-with-approval:
    name: Apply (infra changes — approval required)
    needs: build-and-plan
    if: needs.build-and-plan.outputs.has-tf-changes == 'true'
    runs-on: ubuntu-latest
    environment: infra-approval  # pauses for manual approval — review the plan summary in build-and-plan before approving
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~> 1.5'
          terraform_wrapper: false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend-config="prefix=env/prod"

      - name: Terraform apply
        working-directory: terraform
        run: terraform apply tfplan
