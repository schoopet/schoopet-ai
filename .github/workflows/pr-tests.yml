name: PR Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/schoopet/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run agent tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest agents/schoopet/tests/ -v --tb=short

  test-sms-gateway:
    name: Test SMS Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sms-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run SMS gateway tests
        env:
          PYTHONPATH: ${{ github.workspace }}/sms-gateway
          GOOGLE_CLOUD_PROJECT: test-project
          GOOGLE_CLOUD_LOCATION: us-central1
          AGENT_ENGINE_ID: test-engine-id
          TWILIO_ACCOUNT_SID: ACtest123
          TWILIO_AUTH_TOKEN: test-auth-token
          TWILIO_PHONE_NUMBER: "+15551234567"
        run: |
          python -m pytest tests/ -v --tb=short
