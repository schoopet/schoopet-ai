name: PR Tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  test-agent:
    name: Test Agent
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/schoopet/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run agent tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest agents/schoopet/tests/ -v --tb=short

  test-sms-gateway:
    name: Test SMS Gateway
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sms-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run SMS gateway tests
        env:
          PYTHONPATH: ${{ github.workspace }}/sms-gateway
        run: |
          python -m pytest tests/ -v --tb=short

  test-task-worker:
    name: Test Task Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: task-worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run task worker tests
        env:
          PYTHONPATH: ${{ github.workspace }}/task-worker
        run: |
          python -m pytest tests/ -v --tb=short
